<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagi-bagi THR Lebaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #064e3b;
            --primary-light: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #065f46, #064e3b);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            user-select: none;
            -webkit-user-select: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            text-align: center;
            color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .hidden-section {
            display: none !important;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            width: 100%;
            display: block;
            transition: transform 0.2s;
        }

        .btn-gradient:active {
            transform: scale(0.98);
        }

        .btn-claim {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white !important;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            text-decoration: none;
            display: block;
            margin-top: 15px;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(234, 88, 12, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0); }
        }

        .info-banner {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #92400e;
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qr-wrapper {
            background: #f8fafc;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            display: inline-block;
            margin-bottom: 10px;
        }

        #message-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Tampilan 1: Welcome -->
    <div id="welcome-screen" class="glass-card">
        <div class="text-6xl mb-4">🌙</div>
        <h1 class="text-2xl font-extrabold text-emerald-900 mb-2">Selamat Idul Fitri</h1>
        <p class="text-slate-500 mb-8 leading-relaxed">Minal Aidin Wal Faizin.<br>Mohon Maaf Lahir dan Batin.</p>
        
        <div class="info-banner">
            <span class="text-xl">ℹ️</span>
            <p>Klik tombol di bawah untuk memasukkan kode redeem THR kamu.</p>
        </div>

        <button onclick="goToRedeem()" class="btn-gradient text-lg">
            BUKA AMPLOP 🧧
        </button>
    </div>

    <!-- Tampilan 2: Input Kode -->
    <div id="redeem-screen" class="glass-card hidden-section">
        <h2 class="text-xl font-bold text-emerald-900 mb-6">Verifikasi Kode Redem</h2>
        
        <input type="text" id="redeem-input" placeholder="INPUT KODE REDEM" 
               class="w-full bg-slate-100 border-2 border-transparent focus:border-emerald-500 rounded-2xl px-4 py-4 mb-4 outline-none text-center font-extrabold tracking-widest text-xl text-emerald-900 transition-all uppercase">
        
        <button onclick="processVerify()" class="btn-gradient mb-6">
            VERIFIKASI
        </button>

        <p class="text-xs text-slate-400 mb-2">Belum punya kode?</p>
        <button onclick="contactOwner()" class="inline-flex items-center gap-2 bg-[#25D366] text-white px-6 py-3 rounded-full font-bold text-sm border-none cursor-pointer">
            Minta Kode ke Owner
        </button>
    </div>

    <!-- Tampilan 3: Success -->
    <div id="qr-screen" class="glass-card hidden-section">
        <div class="text-4xl mb-2">🎊</div>
        <h2 class="text-2xl font-extrabold text-emerald-900 mb-2">Berhasil Terbuka!</h2>
        <p class="text-sm text-slate-500 mb-6">Klik tombol di bawah untuk klaim di aplikasi DANA.</p>
        
        <div class="qr-wrapper">
            <img id="qr-image" src="" alt="QR" class="w-48 h-48 object-contain">
        </div>

        <button onclick="handleDanaClaim()" class="btn-claim">
            BUKA APLIKASI DANA 💰
        </button>

        <button onclick="location.reload()" class="mt-8 text-slate-400 font-bold text-xs bg-transparent border-none cursor-pointer uppercase">
            Kembali
        </button>
    </div>

    <div id="message-box"></div>

    <script>
        const waNumber = "6287864905121";
        const waMessage = "✨Assalamu'alaikum Owner😊, Selamat Idul Fitri..Maafin gua ya kalo ada salah..., Heheh boleh minta Kode Redem nya Abang Rahmat?✨🙏";

        const redeemData = {
            "THR-7712": "https://link.dana.id/danakaget?c=sdlybfys5&r=eDUdTe&orderId=20260312101214255115010300166865668471322",
            "THR-1212": "https://link.dana.id/danakaget?c=sdlybfys5&r=eDUdTe&orderId=20260312101214255115010300166865668471322"
        };

        let activeLink = "";

        function goToRedeem() {
            document.getElementById('welcome-screen').classList.add('hidden-section');
            document.getElementById('redeem-screen').classList.remove('hidden-section');
        }

        function contactOwner() {
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(waMessage)}`, '_blank');
        }

        function processVerify() {
            const inputElement = document.getElementById('redeem-input');
            const codeInput = inputElement.value.trim().toUpperCase();
            
            if (redeemData[codeInput]) {
                activeLink = redeemData[codeInput];
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(activeLink)}`;
                document.getElementById('qr-image').src = qrUrl;
                document.getElementById('redeem-screen').classList.add('hidden-section');
                document.getElementById('qr-screen').classList.remove('hidden-section');
            } else {
                showToast("❌ Kode salah atau tidak aktif!");
            }
        }

        // FUNGSI KHUSUS UNTUK BYPASS KENDALA DANA
        function handleDanaClaim() {
            if (!activeLink) return;

            showToast("Menghubungkan ke sistem DANA...");

            // 1. Ekstrak data link untuk membuat Android Intent (Sangat Ampuh untuk Android)
            // Format link asli: https://link.dana.id/danakaget?c=...
            const urlData = activeLink.split('https://link.dana.id/')[1];
            const androidIntent = `intent://link.dana.id/${urlData}#Intent;scheme=https;package=id.dana;end`;

            // 2. Cek apakah user menggunakan Mobile
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isAndroid) {
                // Untuk Android, paksa pakai Intent. Ini akan langsung membuka aplikasi DANA tanpa melewati browser.
                window.location.href = androidIntent;
            } else if (isIOS) {
                // Untuk iOS, DANA biasanya sudah otomatis mendeteksi link HTTPS DANA sebagai Universal Link.
                window.location.href = activeLink;
            } else {
                // Untuk Desktop/Lainnya
                window.open(activeLink, '_blank');
            }

            // Backup: Jika dalam 1 detik aplikasi tidak terbuka, arahkan ke link asli
            setTimeout(() => {
                window.location.assign(activeLink);
            }, 1000);
        }

        function showToast(text) {
            const toast = document.getElementById('message-box');
            toast.innerText = text;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        };
    </script>
</body>
</html>
